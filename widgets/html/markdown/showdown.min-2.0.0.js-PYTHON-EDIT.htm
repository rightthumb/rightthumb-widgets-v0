<div style="display:inline-block; float:left; padding-left: 20px;" onclick="markdown.form.editor();$(this).css('display','none');$('#div_close').css('display','none');">edit</div>
<div id="div_close" style="display:inline-block; float:right; padding-right: 20px;" onclick="markdown.form.close();">close</div>
	<div class="editor" >
		
		<div class="button" onclick="$('#preview').html( converter.makeHtml( $('#markdown').val() ) );markdown.form.checkboxes();" style="float:left;">refresh html</div>

		<div class="editor" style="float:right">
			<input  type="submit" name="save" value="do not save" onclick="markdown.form.close();">
		</div>
			<label  style="display:inline;">also save webpage</label>	&nbsp;	&nbsp;<input type="checkbox" id="webpage" name="webpage" value="1">	&nbsp;	&nbsp;
			<input  type="submit" name="save" value="save" onclick="markdown.form.save();"></div><br/>
			
	
	</div>
	<table width="100%" border="1" cellspacing="10" cellpadding="10" style="height: 100%;">
	  <tbody>
		<tr >
		  <td  style="width: 40%" class="editor" >
		  		
		  			
		  			<textarea class="scroll" name="file" id="markdown" style="width: 100%; height: 100%;" >MARKDOWN_HERE</textarea>
		  			
		  		
			</td>
		  <td  style="width: 40%"> <div class="scroll" id="preview"></div> </td>
		</tr>
	  </tbody>
	</table>
	<form action="http://127.0.0.1:8080/" method="POST" id="markdown_form">
	<input type="hidden" name="html" id="html" >
	<input type="hidden" name="file" id="upload" >
	<input type="hidden" name="path" value="PATH_HERE">
	<input type="hidden" name="shutdown" value="no">
	</form>
	<form action="http://127.0.0.1:8080/" method="POST" id="shutdown">
	<input type="hidden" name="shutdown" value="yes">
	</form>

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.7.5/angular-cookies.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-pageslide-directive/2.2.0/angular-pageslide-directive.js" integrity="sha256-FW2YsacWIn83+j6c02CWOR8fuY4WyzbmmGwz7VOdEI0=" crossorigin="anonymous"></script>
  <script src="https://eyeformeta.com/apps/showdown/editor.js"></script>

	<script type="text/javascript">
$(document).ready(function() {});
        markdown = {};
        markdown.v = {};
        markdown.form = {
                record: 0,
                guid: '',
                editor: function() {
					document.querySelectorAll('.editor').forEach(el => { el.classList.remove('editor'); });
					// markdown.form.editor();
                }, //==============================================
                checkboxes: function() {
				    var htmlContent = $('#preview').html();

				    // Replace [x] with checked checkbox
				    htmlContent = htmlContent.replace(/\[x\]/gi, '<input type="checkbox" checked>');

				    // Replace [ ] with unchecked checkbox
				    htmlContent = htmlContent.replace(/\[ \]/gi, '<input type="checkbox">');

				    $('#preview').html(htmlContent);
					// markdown.form.checkboxes();
                }, //==============================================
                one: function() {
                    $.post(
                            'http://127.0.0.1:8080/', {
                                            'dork': $('#file').val().replace('+','B5B6E23C'),
                            },
                            function(data) {
                            	console.log(data);
                                // markdown.form.two(data);
                            }
                    );
                    // markdown.form.one();
                }, //==============================================
                close: function() {
                	document.getElementById("shutdown").submit();
                    // markdown.form.close();
                }, //==============================================
                save: function(data) {
                	// $('#butt').val(   markdown.form.all( $('#file').val(), '+','B5B6E23C' )  );
                	$('#upload').val(   $('#markdown').val()  );
                	if ($('#webpage').is(':checked')) {
                		$('#html').val(   $('#preview').html()  );
                	}

                	document.getElementById("markdown_form").submit();
                    // markdown.form.save();
                }, //==============================================
                all: function(data,a,b) {
                    while ( data.indexOf(a) > -1 ) {
                    	data = data.replace(a,b);
                    }
                    return data;
                    // markdown.form.all();
                } //==============================================
        };

	</script>


	<script type="text/javascript">
		$( "#markdown" ).keydown(function() {
		  $('#preview').html( converter.makeHtml( $('#markdown').val() ) );
		  markdown.form.checkboxes();
		});

		$('#preview').html( converter.makeHtml( $('#markdown').val() ) );
		markdown.form.checkboxes();
